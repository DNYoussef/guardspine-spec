name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema-validation:
    name: AJV Schema Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Validate all bundles against JSON Schema
        run: npm run validate

  pytest-python-parity:
    name: Python Parity + Schema Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      # Pin to a known-good commit so upstream changes cannot break this gate.
      - name: Install guardspine-kernel-py (pinned)
        run: pip install git+https://github.com/DNYoussef/guardspine-kernel-py.git@97c437a8040604e6ebcfd821fb28d0582ea0198b

      - name: Run Python parity + schema tests
        run: pytest tests/ -v --tb=short

  pytest-cross-language:
    name: Cross-Language Hash Parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install guardspine-kernel-py (pinned)
        run: pip install git+https://github.com/DNYoussef/guardspine-kernel-py.git@97c437a8040604e6ebcfd821fb28d0582ea0198b

      # Check out and build the TS kernel so Node parity tests can find it.
      # The test suite looks for "guardspine-kernel" under GUARDSPINE_PROJECTS_ROOT.
      - name: Check out guardspine-kernel (pinned)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: DNYoussef/guardspine-kernel
          ref: 7473d4d3f7259f4ae5100e4061d231beeea7e608
          path: siblings/guardspine-kernel

      - name: Build guardspine-kernel
        run: cd siblings/guardspine-kernel && npm ci && npm run build

      - name: Run cross-language parity tests
        run: pytest tests/ -v --tb=short -k "Parity or Interop"
        env:
          GUARDSPINE_PROJECTS_ROOT: ${{ github.workspace }}/siblings
